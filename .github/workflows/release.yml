name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  windows-release:
    name: Build Windows portable zip
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build package
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $version = "${{ inputs.version }}"
          }
          .\scripts\package-release.ps1 -Version $version

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: factorio-server-maintainer-windows-x64
          path: |
            dist/*.zip
            dist/*.sha256

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.ref_name }}"
          gh release create $tag dist/*.zip dist/*.sha256 --title $tag --generate-notes
